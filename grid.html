<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Example page</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Navbar area  -->
    <div id="navbar">
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Contact</a>
        </div>
    </div>

    <!-- General Grid  -->
    <div id="page_content">
        <div id="area1">
            Health information
        </div>

        <!-- Game area-->
        <div id="gameWrapper">
            <div id="gameBoard">
                <div class="card-wrapper">
                    <div class="card">
                        <div class="card-front">Front</div>
                        <div class="card-back">Back</div>
                    </div>
                </div>
            </div>
        </div>
</body>

<script>
    /**
     * Populates #gameBoard with an N x M grid of memory-card pairs.
     * Each unique image appears on exactly two cards.
     * Images are fetched from cataas.com.
     * Shows a loading overlay in #gameWrapper until all images are loaded.
     *
     * @param {number} cols - Number of columns (N)
     * @param {number} rows - Number of rows (M)
     */
    async function generateCards(cols, rows) {
        const gameBoard = document.getElementById('gameBoard');
        const gameWrapper = document.getElementById('gameWrapper');
        if (!gameBoard) {
            console.error('Element #gameBoard not found.');
            return;
        }

        const total = cols * rows;
        if (total % 2 !== 0) {
            console.error('cols × rows must be even so every card has a pair.');
            return;
        }

        // --- Loading overlay ---
        const loader = document.createElement('div');
        loader.id = 'card-loader';
        loader.innerHTML = `
        <div class="loader-spinner"></div>
        <p class="loader-text">Loading cats…</p>
    `;
        loader.style.cssText = `
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(4px);
        z-index: 10;
        border-radius: inherit;
        gap: 12px;
    `;

        // Spinner style injected once
        if (!document.getElementById('loader-style')) {
            const style = document.createElement('style');
            style.id = 'loader-style';
            style.textContent = `
            @keyframes spin { to { transform: rotate(360deg); } }
            .loader-spinner {
                width: 48px; height: 48px;
                border: 5px solid #ddd;
                border-top-color: #555;
                border-radius: 50%;
                animation: spin 0.8s linear infinite;
            }
            .loader-text {
                margin: 0;
                font-family: sans-serif;
                font-size: 14px;
                color: #555;
            }
        `;
            document.head.appendChild(style);
        }

        // Make wrapper the positioning context
        if (gameWrapper) {
            gameWrapper.style.position = 'relative';
            gameWrapper.appendChild(loader);
        } else {
            // Fallback: attach to gameBoard's parent
            gameBoard.parentElement.style.position = 'relative';
            gameBoard.parentElement.appendChild(loader);
        }

        // --- Build image URL pairs ---
        const pairs = total / 2;
        const imageUrls = [];
        for (let i = 0; i < pairs; i++) {
            const url = `https://cataas.com/cat?${i}`;
            imageUrls.push(url, url);
        }

        // Fisher-Yates shuffle
        for (let i = imageUrls.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [imageUrls[i], imageUrls[j]] = [imageUrls[j], imageUrls[i]];
        }

        // --- Build cards (hidden until loaded) ---
        gameBoard.innerHTML = '';
        gameBoard.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;
        gameBoard.style.visibility = 'hidden';

        const imgElements = [];

        imageUrls.forEach((url) => {
            const wrapper = document.createElement('div');
            wrapper.classList.add('card-wrapper');

            const card = document.createElement('div');
            card.classList.add('card');

            const front = document.createElement('div');
            front.classList.add('card-front');

            const img = document.createElement('img');
            img.src = url;
            img.alt = 'cat';
            img.style.cssText = 'width:100%; height:100%; object-fit:cover; display:block;';
            front.appendChild(img);
            imgElements.push(img);

            const back = document.createElement('div');
            back.classList.add('card-back');
            back.textContent = '?';

            card.appendChild(front);
            card.appendChild(back);
            wrapper.appendChild(card);
            gameBoard.appendChild(wrapper);
        });

        // --- Wait for all images to load ---
        // Deduplicate: only wait for unique URLs (pairs share the same cached request)
        const uniqueImgs = imgElements.filter((img, idx, arr) =>
            arr.findIndex(other => other.src === img.src) === idx
        );

        await Promise.all(uniqueImgs.map(img =>
            new Promise(resolve => {
                if (img.complete) return resolve();
                img.onload = resolve;
                img.onerror = resolve; // don't hang on a failed load
            })
        ));

        // --- Reveal board, remove loader ---
        gameBoard.style.visibility = '';
        loader.remove();
    }

    // 4 columns × 4 rows = 16 cards = 8 unique cat images
    generateCards(4, 4);
</script>

</html>
